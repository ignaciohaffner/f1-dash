services:
  api:
    image: ghcr.io/slowlydev/f1-dash-api:latest
    restart: unless-stopped
    environment:
      - RUST_LOG=api=info
      - ADDRESS=0.0.0.0:80
      - ORIGIN=${FRONTEND_URL}

  simulator:
    build:
      context: .
      dockerfile: dockerfile
      target: simulator
    restart: unless-stopped
    volumes:
      - ./mock-session.jsonl:/data/session.jsonl
    environment:
      - ADDRESS=0.0.0.0:3001
    command: ["replay", "/data/session.jsonl"]

  realtime:
    build:
      context: .
      dockerfile: dockerfile
      target: realtime
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - simulator
    environment:
      - RUST_LOG=realtime=info
      - ADDRESS=0.0.0.0:80
      - ORIGIN=${FRONTEND_URL}
      - F1_DEV_URL=ws://simulator:3001/ws

  web:
    build:
      context: ./dashboard
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - realtime
      - api
    environment:
      - NEXT_PUBLIC_LIVE_URL=${REALTIME_URL}
      - API_URL=http://api:80
